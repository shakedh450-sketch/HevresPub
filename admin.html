<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול תפריט - Hevres Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --primary: #3b82f6;
            --danger: #ef4444;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }
        
        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        h2, h3 { margin-top: 0; color: var(--primary); }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-danger { background: var(--danger); color: white; padding: 5px 10px; font-size: 0.8rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h2>מרכז ניהול - Hevres Bar</h2>

    <div class="card">
        <h3>הוספת מנה לתפריט</h3>
        <form id="add-item-form">
            <div class="form-group">
                <label>שם המנה</label>
                <input type="text" id="itemName" required placeholder="לדוגמה: המבורגר הבית">
            </div>
            <div class="form-group">
                <label>מחיר</label>
                <input type="number" id="itemPrice" required placeholder="לדוגמה: 65">
            </div>
            <div class="form-group">
                <label>קטגוריה</label>
                <select id="itemCategory">
                    <option value="Starters">ראשונות</option>
                    <option value="Burgers">המבורגרים</option>
                    <option value="Cocktails">קוקטיילים</option>
                    <option value="Beer">שתייה קלה</option>
                </select>
            </div>
            <div class="form-group">
                <label>תיאור</label>
                <textarea id="itemDesc" placeholder="מה יש במנה?"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">הוסף מנה</button>
        </form>
    </div>

    <div class="card">
        <h3>מנות קיימות בתפריט</h3>
        <table id="menu-table">
            <thead>
                <tr>
                    <th>שם</th>
                    <th>מחיר</th>
                    <th>קטגוריה</th>
                    <th>פעולות</th>
                </tr>
            </thead>
            <tbody id="menu-body">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // תדביק כאן את ה-Firebase Config שלך מה-index.html
    const firebaseConfig = {
        apiKey: "AIzaSyDYZxPjSML1gHTTANx0Fp6TlhI5_ookHNU",
        authDomain: "hevresbar.firebaseapp.com",
        projectId: "hevresbar",
        storageBucket: "hevresbar.firebasestorage.app",
        messagingSenderId: "737238391891",
        appId: "1:737238391891:web:ad0076917e2f7133eb7aa6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function renderMenu() {
        const menuBody = document.getElementById('menu-body');
        menuBody.innerHTML = '';
        
        try {
            const querySnapshot = await getDocs(collection(db, "menu_hevres"));
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${data.name}</td>
                    <td>₪${data.price}</td>
                    <td>${data.category}</td>
                    <td><button onclick="window.deleteItem('${docSnap.id}')" class="btn btn-danger">מחק</button></td>
                `;
                menuBody.appendChild(tr);
            });
        } catch (e) {
            console.error("Error loading menu:", e);
        }
    }

    document.getElementById('add-item-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newItem = {
            name: document.getElementById('itemName').value,
            price: Number(document.getElementById('itemPrice').value),
            category: document.getElementById('itemCategory').value,
            desc: document.getElementById('itemDesc').value,
            imageUrl: ""
        };
        await addDoc(collection(db, "menu_hevres"), newItem);
        e.target.reset();
        renderMenu();
    });

    window.deleteItem = async (id) => {
        if (confirm("בטוח שברצונך למחוק את המנה?")) {
            await deleteDoc(doc(db, "menu_hevres", id));
            renderMenu();
        }
    };

    renderMenu();
</script>

</body>
</html>
