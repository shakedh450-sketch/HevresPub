<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חברס | פאנל ניהול תפריט</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007bff;
            --primary-orange: #ff9800;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #333333;
            --danger-color: #dc3545;
            --success-color: #28a745;
        }

        body { font-family: 'Assistant', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        header h1 { color: var(--primary-orange); margin: 0; font-size: 2.5rem; }
        header p { color: #aaa; margin: 5px 0 0 0; }

        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 15px; padding: 25px; margin-bottom: 25px; }
        .card h2 { margin-top: 0; color: var(--primary-orange); border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 1.5rem; }

        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; }
        input[type="text"], textarea { width: 100%; padding: 12px; background: #111; border: 1px solid var(--border-color); border-radius: 8px; color: white; font-family: inherit; box-sizing: border-box; margin-bottom: 15px; }
        textarea { height: 180px; resize: vertical; font-family: monospace; font-size: 0.9rem; }

        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary-orange); color: black; }
        .btn-danger { background: var(--danger-color); color: white; }
        .btn-success { background: var(--success-color); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* קבוצת כפתורים */
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

        /* רשימת מנות קיימות */
        .item-row { display: flex; justify-content: space-between; align-items: center; background: #151515; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #252525; }
        .item-info { display: flex; flex-direction: column; }
        .item-name { font-weight: bold; }
        .item-meta { font-size: 0.85rem; color: #888; margin-top: 3px; }
        
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .status-available { background: rgba(40, 167, 69, 0.2); color: #28a745; border: 1px solid #28a745; }
        .status-unavailable { background: rgba(220, 53, 69, 0.2); color: #dc3545; border: 1px solid #dc3545; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>חברס | פאנל ניהול ועדכון תפריט</h1>
            <p>מערכת הזרקת נתונים ועדכון סטטוס מנות בזמן אמת</p>
        </header>

        <div class="card">
            <h2>📢 עדכון שורת קודם / מבזק</h2>
            <label for="promo-input">טקסט שיווקי בראש התפריט:</label>
            <input type="text" id="promo-input" placeholder="לדוגמה: בר בשרים איכותי בעפולה">
            <button class="btn btn-success" onclick="window.updatePromoText()">שמור עדכון</button>
        </div>

        <div class="card">
            <h2>🚀 הזרקת תפריט קבוצתי (JSON)</h2>
            <p style="font-size: 0.9rem; color: #aaa; margin-bottom: 15px;">הדבק כאן את מערך המנות המעודכן שקיבלת מהצ'אט. הפעולה תשמור את המנות תחת מפתח העסק של חברס.</p>
            <textarea id="json-input" placeholder="[&#10;  { 'name': 'מנה לדוגמה', 'price': 50, 'category': 'המבורגרים' }&#10;]"></textarea>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="window.injectData()">הזרק נתונים חדשים</button>
                <button class="btn btn-danger" onclick="window.clearMenu()">🗑️ ניקוי תפריט קיים</button>
            </div>
        </div>

        <div class="card">
            <h2>📋 מנות קיימות במערכת (<span id="items-count">0</span>)</h2>
            <div id="current-menu-list">
                <p style="color: #666; text-align: center;">טוען מנות מהשרת...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, setDoc, deleteDoc, writeBatch, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYZxPjSML1gHTTANx0Fp6TlhI5_ookHNU",
            authDomain: "hevresbar.firebaseapp.com",
            projectId: "hevresbar",
            storageBucket: "hevresbar.firebasestorage.app",
            messagingSenderId: "737238391891",
            appId: "1:737238391891:web:ad0076917e2f7133eb7aa6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // מפתח ההפרדה הייחודי של חברס
        const B_ID = "hevres";

        let currentItems = [];

        // טעינת הגדרות קיימות
        onSnapshot(doc(db, "settings", B_ID), (s) => {
            if(s.exists()) document.getElementById('promo-input').value = s.data().promoText || "";
        });

        // האזנה למנות קיימות
        const q = query(collection(db, "menus"), where("businessId", "==", B_ID));
        onSnapshot(q, (s) => {
            currentItems = s.docs.map(d => ({ id: d.id, ...d.data() }));
            document.getElementById('items-count').innerText = currentItems.length;
            renderAdminMenu();
        });

        // עדכון טקסט מבזק
        window.updatePromoText = async () => {
            const text = document.getElementById('promo-input').value;
            try {
                await setDoc(doc(db, "settings", B_ID), { promoText: text }, { merge: true });
                alert("הטקסט השיווקי עודכן בהצלחה!");
            } catch (err) {
                alert("שגיאה בעדכון: " + err.message);
            }
        };

        // הזרקת מערך מנות חדש
        window.injectData = async () => {
            const rawJson = document.getElementById('json-input').value;
            if(!rawJson) return alert("אנא הדבק קוד JSON תחילה");

            try {
                const parsed = JSON.parse(rawJson);
                if(!Array.isArray(parsed)) return alert("הקוד חייב להיות מערך (להתחיל ב-[ ולהסתיים ב-])");

                const batch = writeBatch(db);
                parsed.forEach(item => {
                    // יצירת מזהה מסמך ייחודי לפי שם הקטגוריה והמנה כדי למנוע כפילויות
                    const cleanName = item.name.replace(/[^a-zA-Z0-9א-ת]/g, "");
                    const docId = `${B_ID}_${cleanName}`;
                    const docRef = doc(collection(db, "menus"), docId);
                    
                    batch.set(docRef, {
                        ...item,
                        businessId: B_ID,
                        isAvailable: item.isAvailable !== false
                    });
                });

                await batch.commit();
                alert(`הוזרקו בהצלחה ${parsed.length} מנות לחשבון חברס!`);
                document.getElementById('json-input').value = "";
            } catch (err) {
                alert("שגיאה בפענוח ה-JSON, ודא שהעתקת את הקוד במלואו: " + err.message);
            }
        };

        // מחיקת כל התפריט הקיים של חברס
        window.clearMenu = async () => {
            if(!confirm("האם אתה בטוח שברצונך למחוק את כל המנות של חברס? פעולה זו אינה ניתנת לביטול!")) return;

            try {
                const snapshot = await getDocs(query(collection(db, "menus"), where("businessId", "==", B_ID)));
                const batch = writeBatch(db);
                
                snapshot.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                alert("כל המנות של חברס נמחקו מהשרת.");
            } catch (err) {
                alert("שגיאה במחיקה: " + err.message);
            }
        };

        // שינוי סטטוס זמינות מנה (במלאי / חסר)
        window.toggleAvailability = async (id, currentStatus) => {
            try {
                await updateDoc(doc(db, "menus", id), { isAvailable: !currentStatus });
            } catch (err) {
                alert("שגיאה בעדכון הסטטוס: " + err.message);
            }
        };

        // רינדור רשימת המנות בפאנל
        function renderAdminMenu() {
            const container = document.getElementById('current-menu-list');
            if(currentItems.length === 0) {
                container.innerHTML = `<p style="color: #666; text-align: center;">אין מנות קיימות בתפריט של חברס.</p>`;
                return;
            }

            // מיון לפי קטגוריות לנוחות המשתמש
            currentItems.sort((a,b) => a.category.localeCompare(b.category));

            container.innerHTML = currentItems.map(i => {
                const isAvail = i.isAvailable !== false;
                return `
                    <div class="item-row">
                        <div class="item-info">
                            <span class="item-name">${i.name}</span>
                            <span class="item-meta">${i.category} | ₪${i.price}</span>
                        </div>
                        <span class="status-badge ${isAvail ? 'status-available' : 'status-unavailable'}" 
                              onclick="window.toggleAvailability('${i.id}', ${isAvail})">
                            ${isAvail ? '🟢 במלאי' : '🔴 חסר במלאי'}
                        </span>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
