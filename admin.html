<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Hevres Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --text: #f1f5f9; }
        body { font-family: 'Assistant', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .admin-content { display: none; width: 100%; max-width: 900px; padding: 20px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        
        /* כאן תעתיק את כל ה-CSS מה-admin.html הקודם שלך (של כרטיסיות הניהול) */
        /* ... ה-CSS הקודם ... */
    </style>
</head>
<body>

<div id="loginSection" class="login-box">
    <h2>כניסת מנהל 🍸</h2>
    <input type="email" id="loginEmail" placeholder="אימייל">
    <input type="password" id="loginPassword" placeholder="סיסמה">
    <button onclick="window.login()">התחבר</button>
    <p id="loginError" style="color:#ef4444; font-size:0.8rem; margin-top:10px;"></p>
</div>

<div id="adminSection" class="admin-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Control Center 🍸</h2>
        <button onclick="window.logout()" style="width:auto; background:#475569;">התנתק</button>
    </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, onSnapshot, updateDoc, setDoc, getDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYZxPjSML1gHTTANx0Fp6TlhI5_ookHNU",
        authDomain: "hevresbar.firebaseapp.com",
        projectId: "hevresbar",
        storageBucket: "hevresbar.firebasestorage.app",
        messagingSenderId: "737238391891",
        appId: "1:737238391891:web:ad0076917e2f7133eb7aa6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ניהול מצב התחברות
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            document.body.style.display = 'block'; // הצגת כל הדף
            initAdmin(); // הרצת פונקציות הניהול
        } else {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminSection').style.display = 'none';
        }
    });

    window.login = async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            document.getElementById('loginError').innerText = "פרטים שגויים, נסה שוב";
        }
    };

    window.logout = () => signOut(auth);

    // כאן תדביק את כל שאר פונקציות הניהול (onSnapshot, saveItem, toggleStock וכו')
    function initAdmin() {
        // ... כל הלוגיקה של הניהול שכתבנו קודם ...
    }
</script>
</body>
</html>
