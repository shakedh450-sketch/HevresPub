<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול תפריט - Hevres Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }
        
        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        h2, h3 { margin-top: 0; color: var(--primary); }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; }

        .bulk-section textarea { font-family: monospace; height: 120px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ניהול תפריט Hevres Bar</h2>

    <div class="card">
        <h3>הוספת מנה חדשה</h3>
        <form id="add-item-form">
            <div class="form-group">
                <label>שם המנה</label>
                <input type="text" id="itemName" required>
            </div>
            <div class="form-group">
                <label>מחיר</label>
                <input type="number" id="itemPrice" required>
            </div>
            <div class="form-group">
                <label>קטגוריה</label>
                <select id="itemCategory">
                    <option value="Starters">ראשונות</option>
                    <option value="Burgers">המבורגרים</option>
                    <option value="Cocktails">קוקטיילים</option>
                    <option value="Beer">בירה</option>
                    <option value="Wine">יין</option>
                </select>
            </div>
            <div class="form-group">
                <label>תיאור</label>
                <textarea id="itemDesc"></textarea>
            </div>
            <button type="submit" class="btn-primary">הוסף מנה לתפריט</button>
        </form>
    </div>

    <div class="card bulk-section" style="border: 2px solid var(--success);">
        <h3>🚀 הזנה מהירה (Bulk Add)</h3>
        <p style="font-size: 0.85rem; color: #94a3b8;">הדבק שורות בפורמט: שם, מחיר, קטגוריה, תיאור</p>
        <textarea id="bulkInput" placeholder="צ'יפס, 35, Starters, צ'יפס פריך עם איולי..."></textarea>
        <button onclick="handleBulkAdd()" class="btn-success" style="margin-top: 10px;">הזרק מנות לתפריט</button>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>מנות בתפריט</h3>
            <button onclick="clearAllMenu()" class="btn-danger">מחיקת כל התפריט (זהירות!)</button>
        </div>
        <table id="menu-table">
            <thead>
                <tr>
                    <th>שם</th>
                    <th>מחיר</th>
                    <th>קטגוריה</th>
                    <th>פעולות</th>
                </tr>
            </thead>
            <tbody id="menu-body">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // הגדרות Firebase - תוודא שהן תואמות לשלך!
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "hevres-bar.firebaseapp.com",
        projectId: "hevres-bar",
        storageBucket: "hevres-bar.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // טעינת התפריט
    async function renderMenu() {
        const menuBody = document.getElementById('menu-body');
        menuBody.innerHTML = '<tr><td colspan="4">טוען נתונים...</td></tr>';
        
        const querySnapshot = await getDocs(collection(db, "menu_hevres"));
        menuBody.innerHTML = '';
        
        querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${data.name}</td>
                <td>₪${data.price}</td>
                <td>${data.category}</td>
                <td><button onclick="deleteItem('${docSnap.id}')" class="btn-danger" style="padding: 5px 10px;">מחק</button></td>
            `;
            menuBody.appendChild(tr);
        });
    }

    // הוספת מנה בודדת
    document.getElementById('add-item-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newItem = {
            name: document.getElementById('itemName').value,
            price: Number(document.getElementById('itemPrice').value),
            category: document.getElementById('itemCategory').value,
            desc: document.getElementById('itemDesc').value,
            imageUrl: ""
        };
        await addDoc(collection(db, "menu_hevres"), newItem);
        e.target.reset();
        renderMenu();
    });

    // --- פונקציות גלובליות ---

    // הזרקת מנות מרובה
    window.handleBulkAdd = async () => {
        const text = document.getElementById('bulkInput').value;
        const lines = text.split('\n').filter(line => line.trim() !== "");
        if (!confirm(`מוכן להוסיף ${lines.length} מנות?`)) return;

        for (let line of lines) {
            const [name, price, category, desc] = line.split(',').map(s => s.trim());
            await addDoc(collection(db, "menu_hevres"), {
                name: name,
                price: Number(price) || 0,
                category: category || "Starters",
                desc: desc || "",
                imageUrl: ""
            });
        }
        alert("ההזרקה הושלמה!");
        document.getElementById('bulkInput').value = '';
        renderMenu();
    };

    // מחיקת כל התפריט במכה אחת
    window.clearAllMenu = async () => {
        if (!confirm("זה ימחק הכל. בטוח?")) return;
        const querySnapshot = await getDocs(collection(db, "menu_hevres"));
        const deletePromises = querySnapshot.docs.map(d => deleteDoc(doc(db, "menu_hevres", d.id)));
        await Promise.all(deletePromises);
        renderMenu();
    };

    // מחיקת מנה בודדת
    window.deleteItem = async (id) => {
        if (confirm("למחוק את המנה?")) {
            await deleteDoc(doc(db, "menu_hevres", id));
            renderMenu();
        }
    };

    // הפעלה ראשונית
    renderMenu();
</script>

</body>
</html>
