<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Center - Hevres Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --primary: #3b82f6; --danger: #ef4444; --success: #10b981; --accent: #fbbf24;
        }

        body { font-family: 'Assistant', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }

        /* שורת סטטוס עליונה */
        .status-bar { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; 
            background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 30px;
            border: 1px solid #334155;
        }

        .status-box h4 { margin: 0 0 10px 0; font-size: 0.9rem; color: #94a3b8; }
        input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; }

        /* כרטיסיות ניהול */
        .admin-grid { display: grid; gap: 15px; }
        .admin-card { 
            background: var(--card); padding: 15px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-right: 5px solid var(--primary);
        }
        .admin-card.out-of-stock { border-right-color: var(--danger); opacity: 0.6; }

        .info h3 { margin: 0; font-size: 1.1rem; }
        .info p { margin: 5px 0 0 0; font-size: 0.85rem; color: #94a3b8; }

        .actions { display: flex; gap: 10px; align-items: center; }
        
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(26px); }

        .price-tag { background: #334155; padding: 5px 10px; border-radius: 6px; font-weight: bold; color: var(--accent); cursor: pointer; }
        
        .btn-add { background: var(--primary); color: white; padding: 15px; border-radius: 12px; width: 100%; border: none; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
        
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 30px; border-radius: 20px; z-index: 100; width: 90%; max-width: 400px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Control Center 🍸</h2>
        <button class="btn-add" style="width: auto;" onclick="openModal()">+ מנה חדשה</button>
    </div>

    <div class="status-bar">
        <div class="status-box">
            <h4>מבצע רץ (יופיע בראש התפריט)</h4>
            <input type="text" id="promoText" placeholder="לדוגמה: 1+1 על כל הקוקטיילים עד 20:00" onchange="updateGlobalSettings()">
        </div>
        <div class="status-box">
            <h4>הודעת עומס / זמן הכנה</h4>
            <select id="kitchenStatus" onchange="updateGlobalSettings()" style="width:100%; padding:10px; border-radius:8px; background:#0f172a; color:white;">
                <option value="normal">מצב רגיל - Good Vibes</option>
                <option value="busy">עומס קל - 20 דקות המתנה</option>
                <option value="very-busy">עומס כבד - מטבח סגור זמנית</option>
            </select>
        </div>
    </div>

    <div id="admin-grid" class="admin-grid">
        </div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="itemModal">
    <h3 id="modalTitle">הוספת מנה</h3>
    <input type="text" id="itemName" placeholder="שם המנה" style="margin-bottom:10px;">
    <input type="number" id="itemPrice" placeholder="מחיר" style="margin-bottom:10px;">
    <textarea id="itemDesc" placeholder="תיאור" style="margin-bottom:10px; width:100%; border-radius:8px; background:#0f172a; color:white; padding:10px;"></textarea>
    <button onclick="saveItem()" class="btn-add" style="margin:0;">שמור שינויים</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc, addDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYZxPjSML1gHTTANx0Fp6TlhI5_ookHNU",
        authDomain: "hevresbar.firebaseapp.com",
        projectId: "hevresbar",
        storageBucket: "hevresbar.firebasestorage.app",
        messagingSenderId: "737238391891",
        appId: "1:737238391891:web:ad0076917e2f7133eb7aa6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // האזנה בזמן אמת לשינויים (Live Update)
    onSnapshot(collection(db, "menu_hevres"), (snapshot) => {
        const grid = document.getElementById('admin-grid');
        grid.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const isOut = data.isAvailable === false;
            
            const card = document.createElement('div');
            card.className = `admin-card ${isOut ? 'out-of-stock' : ''}`;
            card.innerHTML = `
                <div class="info" onclick="editItemInline('${docSnap.id}', '${data.name}', ${data.price})">
                    <h3>${data.name}</h3>
                    <p>${data.category} | ${data.desc || ''}</p>
                </div>
                <div class="actions">
                    <div class="price-tag" onclick="changePrice('${docSnap.id}', ${data.price})">₪${data.price}</div>
                    <label class="switch">
                        <input type="checkbox" ${!isOut ? 'checked' : ''} onchange="window.toggleStock('${docSnap.id}', this.checked)">
                        <span class="slider"></span>
                    </label>
                    <button onclick="window.deleteItem('${docSnap.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer;">🗑️</button>
                </div>
            `;
            grid.appendChild(card);
        });
    });

    window.toggleStock = async (id, isAvailable) => {
        await updateDoc(doc(db, "menu_hevres", id), { isAvailable });
    };

    window.changePrice = async (id, oldPrice) => {
        const newPrice = prompt("מחיר חדש:", oldPrice);
        if (newPrice) await updateDoc(doc(db, "menu_hevres", id), { price: Number(newPrice) });
    };

    window.deleteItem = async (id) => {
        if(confirm("למחוק סופית?")) await deleteDoc(doc(db, "menu_hevres", id));
    };

    // פונקציות מודאל (הכנה להרחבה)
    window.openModal = () => {
        document.getElementById('itemModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    };
    window.closeModal = () => {
        document.getElementById('itemModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    };

    window.saveItem = async () => {
        const newItem = {
            name: document.getElementById('itemName').value,
            price: Number(document.getElementById('itemPrice').value),
            category: "Starters", // אפשר להוסיף Select
            desc: document.getElementById('itemDesc').value,
            isAvailable: true
        };
        await addDoc(collection(db, "menu_hevres"), newItem);
        closeModal();
    };

</script>
</body>
</html>
