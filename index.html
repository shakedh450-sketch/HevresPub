<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEVRES BAR - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --primary: #3b82f6; --accent: #fbbf24; --orange: #ff9800;
        }

        html { scroll-behavior: smooth; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.6; }

        /* מבנה כללי */
        header { text-align: center; padding: 40px 20px; background: linear-gradient(rgba(15,23,42,0.8), rgba(15,23,42,0.8)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80'); background-size: cover; background-position: center; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* סרגל קטגוריות דביק */
        .categories-wrapper { position: sticky; top: 0; background: var(--bg); z-index: 1000; padding: 15px 0; border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .categories-container { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding: 0 20px; }
        .cat-btn { padding: 10px 20px; border-radius: 25px; border: 1px solid #334155; background: var(--card); color: var(--text); cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: var(--primary); border-color: var(--primary); }

        /* מנות */
        .category-section { padding-top: 20px; margin-bottom: 40px; }
        .category-title { font-size: 1.5rem; color: var(--accent); margin-bottom: 20px; border-right: 4px solid var(--primary); padding-right: 15px; }
        .menu-item { background: var(--card); padding: 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .item-price { font-weight: bold; color: var(--accent); }

        /* כפתור "פרגנו לנו" - הפיצ'ר החדש */
        .floating-review-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .floating-review-btn:hover { transform: scale(1.05); }

        .btn-icon-circle {
            width: 55px;
            height: 55px;
            background: var(--orange);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 2;
            font-size: 1.5rem;
        }

        .btn-pill-text {
            background: var(--orange);
            color: #000;
            font-weight: 700;
            padding: 10px 25px 10px 40px; /* ריווח שמאלה כדי שייכנס מתחת לעיגול */
            border-radius: 30px;
            margin-right: -25px; /* הצמדה לעיגול */
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        /* תיבת הדירוג (מוסתרת בהתחלה) */
        .rating-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 3000;
            align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }

        .rating-box {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 350px;
            border: 1px solid var(--primary);
        }

        .stars { display: flex; justify-content: center; gap: 10px; margin: 20px 0; font-size: 2.2rem; cursor: pointer; }
        .star { color: #475569; }
        .star.active { color: var(--accent); }

        textarea { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; border-radius: 8px; padding: 10px; margin-bottom: 15px; font-family: inherit; }
    </style>
</head>
<body>

<header>
    <h1>HEVRES BAR</h1>
    <p>Afula • Good Vibes • Better Drinks</p>
</header>

<div class="container">
    <div class="categories-wrapper">
        <div id="categories-container" class="categories-container"></div>
    </div>
    <div id="menu-content"></div>
</div>

<!-- כפתור ה"פרגנו לנו" הצף -->
<div class="floating-review-btn" onclick="window.openRating()">
    <div class="btn-icon-circle">📝</div>
    <div class="btn-pill-text">⭐ פרגנו לנו ב-5 כוכבים</div>
</div>

<!-- תיבת הדירוג החכמה -->
<div class="rating-overlay" id="ratingOverlay">
    <div class="rating-box">
        <div style="text-align: left; cursor: pointer;" onclick="window.closeRating()">✕</div>
        <h3>איך הייתה החוויה שלכם? 🍸</h3>
        <div class="stars" id="starContainer">
            <span class="star" data-v="1">★</span>
            <span class="star" data-v="2">★</span>
            <span class="star" data-v="3">★</span>
            <span class="star" data-v="4">★</span>
            <span class="star" data-v="5">★</span>
        </div>
        <div id="feedbackForm" style="display:none;">
            <textarea id="feedbackMsg" rows="3" placeholder="נשמח לשמוע מה אפשר לשפר..."></textarea>
            <button onclick="sendFeedback()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:8px; width:100%; cursor:pointer;">שלח משוב</button>
        </div>
        <div id="thankYou" style="display:none; color:var(--accent); font-weight:bold;">
            תודה רבה! מעריכים את זה מאוד.
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYZxPjSML1gHTTANx0Fp6TlhI5_ookHNU",
        authDomain: "hevresbar.firebaseapp.com",
        projectId: "hevresbar",
        storageBucket: "hevresbar.firebasestorage.app",
        messagingSenderId: "737238391891",
        appId: "1:737238391891:web:ad0076917e2f7133eb7aa6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const googleLink = "https://search.google.com/local/writereview?placeid=ChIJ7ZiYNuRTHBURotvjTJOhuHs";

    // לוגיקת דירוג
    window.openRating = () => document.getElementById('ratingOverlay').style.display = 'flex';
    window.closeRating = () => document.getElementById('ratingOverlay').style.display = 'none';

    const stars = document.querySelectorAll('.star');
    stars.forEach(s => {
        s.onclick = () => {
            const val = parseInt(s.dataset.v);
            stars.forEach((st, i) => st.classList.toggle('active', i < val));

            if (val >= 4) {
                document.getElementById('thankYou').innerText = "איזה כיף! מעבירים אתכם לגוגל...";
                document.getElementById('thankYou').style.display = 'block';
                setTimeout(() => { window.open(googleLink, '_blank'); window.closeRating(); }, 1200);
            } else {
                document.getElementById('feedbackForm').style.display = 'block';
            }
        };
    });

    window.sendFeedback = () => {
        document.getElementById('feedbackForm').style.display = 'none';
        document.getElementById('thankYou').innerText = "תודה על הכנות, המשוב התקבל.";
        document.getElementById('thankYou').style.display = 'block';
        setTimeout(window.closeRating, 2000);
    };

    // בניית תפריט (זהה לקוד הקודם)
    let allItems = [];
    const preferredOrder = ['Starters', 'Burgers', 'Cocktails', 'Beer'];
    const categoryNames = {'Starters': 'ראשונות', 'Burgers': 'המבורגרים', 'Cocktails': 'קוקטיילים', 'Beer': 'שתייה קלה'};

    onSnapshot(collection(db, "menu_hevres"), (snap) => {
        allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTabs();
        renderMenu();
        setupScrollSpy();
    });

    function renderTabs() {
        const container = document.getElementById('categories-container');
        container.innerHTML = preferredOrder.map(cat => `
            <button class="cat-btn" id="tab-${cat}" onclick="window.scrollToCategory('${cat}')">${categoryNames[cat]}</button>
        `).join('');
    }

    function renderMenu() {
        const content = document.getElementById('menu-content');
        content.innerHTML = preferredOrder.map(cat => {
            const catItems = allItems.filter(i => i.category === cat && i.isAvailable !== false);
            if (catItems.length === 0) return '';
            return `
                <section id="section-${cat}" class="category-section">
                    <h2 class="category-title">${categoryNames[cat]}</h2>
                    <div class="menu-grid">
                        ${catItems.map(item => `
                            <div class="menu-item">
                                <div class="item-info">
                                    <h3>${item.name}</h3>
                                    <p>${item.desc || ''}</p>
                                </div>
                                <div class="item-price">₪${item.price}</div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;
        }).join('');
    }

    window.scrollToCategory = (cat) => {
        const el = document.getElementById(`section-${cat}`);
        if (el) {
            const offset = 100;
            const top = el.getBoundingClientRect().top + window.pageYOffset - offset;
            window.scrollTo({ top, behavior: 'smooth' });
        }
    };

    function setupScrollSpy() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const cat = entry.target.id.replace('section-', '');
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    const tab = document.getElementById(`tab-${cat}`);
                    if (tab) tab.classList.add('active');
                }
            });
        }, { rootMargin: '-100px 0px -70% 0px' });
        preferredOrder.forEach(cat => {
            const sec = document.getElementById(`section-${cat}`);
            if (sec) observer.observe(sec);
        });
    }
</script>
</body>
</html>
