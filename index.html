<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>החבר'ס - הפאב החברתי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&family=Heebo:wght@400;700;900&family=Alef:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bar-red: #b91c1c;
            --bar-gold: #d4af37;
            --menu-bg: #f2ede1;
            --menu-text: #1a2e35;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Assistant', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .view-home {
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            background-color: #d1d5db;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .view-menu, .view-cart {
            background-color: var(--menu-bg);
            background-image: url('https://www.transparenttextures.com/patterns/beige-paper.png');
            min-height: 100vh;
            color: var(--menu-text);
        }

        .logo-font { font-family: 'Heebo', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
        }

        .btn-red { background: linear-gradient(135deg, #b91c1c 0%, #7f1d1d 100%); }
        .btn-gold { background: linear-gradient(135deg, #d4af37 0%, #a68a1a 100%); }

        .hidden { display: none !important; }

        .tabs-container {
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(242, 237, 225, 0.95);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .tab-button {
            padding: 12px 16px;
            font-weight: 800;
            font-size: 0.9rem;
            color: rgba(26, 46, 53, 0.5);
            transition: all 0.2s;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
        }

        .tab-button.active {
            color: var(--bar-red);
            border-bottom-color: var(--bar-red);
        }

        .cart-footer-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--bar-red);
            color: white;
            padding: 16px 24px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(185, 28, 28, 0.4);
            z-index: 100;
            transform: translateY(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cart-footer-bar.visible {
            transform: translateY(0);
        }

        .add-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bar-red);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: transform 0.2s;
        }

        .add-btn:active { transform: scale(1.3); }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="page-home" class="view-home px-6 py-12 fade-in">
        <div class="w-full max-w-md text-center space-y-8">
            <header class="mb-4">
                <div class="flex justify-center gap-1 text-yellow-600 text-2xl mb-2">
                    <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
                </div>
                <h1 class="text-7xl font-black text-red-800 logo-font tracking-tighter">החבר'ס</h1>
                <div class="mt-3 inline-block bg-black text-white px-8 py-2 rounded-full font-bold text-xl transform -rotate-1 shadow-lg">הפאב החברתי</div>
            </header>

            <div class="grid gap-6">
                <button onclick="navigateTo('menu')" class="glass-card p-6 shadow-xl border-2 border-transparent hover:border-red-600">
                    <div class="text-5xl mb-3">🍺</div>
                    <h2 class="text-2xl font-extrabold text-gray-800">התפריט וההזמנה שלי</h2>
                    <p class="text-gray-600 mt-1 mb-4 text-sm">בחרו מנות וראו את סיכום החשבון</p>
                    <div class="btn-red text-white py-3 rounded-xl font-bold text-lg">לפתיחת התפריט</div>
                </button>

                <a href="https://search.google.com/local/writereview?placeid=ChIJ7ZiYNuRTHBURotvjTJOhuHs" target="_blank" class="glass-card p-6 shadow-xl block border-2 border-transparent hover:border-yellow-500">
                    <div class="text-3xl mb-3 flex justify-center gap-1">⭐⭐⭐⭐⭐</div>
                    <h2 class="text-2xl font-extrabold text-gray-800">דרגו אותנו</h2>
                    <div class="btn-gold text-white py-3 mt-4 rounded-xl font-bold text-lg">דרגו בגוגל</div>
                </a>

                <a href="https://www.instagram.com/hevres_pub_afula?igsh=Z2hxeWRkampxM28z" target="_blank" class="glass-card p-6 shadow-xl block border-2 border-transparent hover:border-pink-500">
                    <div class="text-5xl mb-3">📸</div>
                    <h2 class="text-2xl font-extrabold text-gray-800">האינסטגרם שלנו</h2>
                    <div class="bg-gradient-to-r from-purple-600 to-pink-500 text-white py-3 mt-4 rounded-xl font-bold text-lg">עקבו אחרינו</div>
                </a>
            </div>
        </div>
    </div>

    <div id="page-menu" class="view-menu hidden">
        <div class="tabs-container overflow-x-auto">
            <div class="flex px-4">
                <button onclick="switchTab('starters')" id="tab-starters" class="tab-button active">ראשונות</button>
                <button onclick="switchTab('mains')" id="tab-mains" class="tab-button">עיקריות</button>
                <button onclick="switchTab('softdrinks')" id="tab-softdrinks" class="tab-button">שתייה</button>
                <button onclick="switchTab('cocktails')" id="tab-cocktails" class="tab-button">קוקטיילים</button>
            </div>
        </div>

        <div class="max-w-2xl mx-auto px-6 pt-8 pb-32" id="menu-items-container">
            </div>

        <div id="cart-bar" class="cart-footer-bar" onclick="navigateTo('cart')">
            <div class="flex items-center gap-3">
                <span id="cart-count-badge" class="bg-white text-red-800 font-bold w-7 h-7 rounded-full flex items-center justify-center">0</span>
                <span class="font-bold">צפייה בהזמנה</span>
            </div>
            <div class="text-xl font-black" id="cart-total-bar">₪0</div>
        </div>

        <button onclick="navigateTo('home')" class="fixed top-20 left-4 w-10 h-10 bg-white/80 rounded-full flex items-center justify-center shadow-md z-30">✕</button>
    </div>

    <div id="page-cart" class="view-cart hidden p-6">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black logo-font">ההזמנה שלי</h2>
                <button onclick="navigateTo('menu')" class="text-red-700 font-bold">חזרה לתפריט</button>
            </div>

            <div id="cart-items-list" class="space-y-4 mb-10"></div>

            <div class="glass-card p-6 shadow-lg mb-8 border-2 border-red-800/10">
                <div class="flex justify-between items-center text-2xl font-black">
                    <span>סה"כ לתשלום:</span>
                    <span id="cart-final-total" class="text-red-700">₪0</span>
                </div>
            </div>

            <button onclick="clearCart()" class="w-full py-3 text-gray-500 font-bold text-sm mb-4 italic">איפוס הזמנה</button>
            
            <button onclick="alert('התפריט משמש כסימולטור הזמנה בלבד.')" class="w-full btn-red text-white py-5 rounded-3xl text-2xl font-black shadow-xl">
                סיכמתי, תודה!
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhBcHYHkYgkgdq04hvdg5o-HaSWYb645g",
            authDomain: "hevres.firebaseapp.com",
            projectId: "hevres",
            storageBucket: "hevres.firebasestorage.app",
            messagingSenderId: "135029926033",
            appId: "1:135029926033:web:9605d82e4dddb5cc4d3730",
            measurementId: "G-HVFBN7QP0R"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let menuData = { starters: [], mains: [], softdrinks: [], cocktails: [] };
        let cart = [];

        // טעינת התפריט מהענן
        async function fetchMenu() {
            try {
                const querySnapshot = await getDocs(collection(db, "menu"));
                menuData = { starters: [], mains: [], softdrinks: [], cocktails: [] };
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    if (menuData[data.category]) {
                        menuData[data.category].push({ id: doc.id, ...data });
                    }
                });
                renderMenu('starters');
            } catch (error) {
                console.error("שגיאה בטעינה:", error);
            }
        }

        // פונקציות גלובליות
        window.navigateTo = (pageId) => {
            document.querySelectorAll('.view-home, .view-menu, .view-cart').forEach(el => el.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            window.scrollTo(0,0);
            if(pageId === 'cart') renderCart();
        };

        window.switchTab = (cat) => {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
            renderMenu(cat);
        };

        window.renderMenu = (cat) => {
            const container = document.getElementById('menu-items-container');
            container.innerHTML = `<div class="text-center mb-8"><h3 class="text-2xl font-black border-b-2 border-black inline-block px-4 uppercase">${cat.toUpperCase()}</h3></div>`;
            
            if (menuData[cat].length === 0) {
                container.innerHTML += `<p class="text-center opacity-50">אין פריטים בקטגוריה זו כרגע.</p>`;
                return;
            }

            menuData[cat].forEach(item => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center border-b border-black/10 pb-6 mb-6 fade-in";
                div.innerHTML = `
                    <div class="flex-1">
                        <div class="text-xl font-extrabold">${item.name} <span class="text-red-700 font-black mr-2">₪${item.price}</span></div>
                        <p class="text-sm opacity-60 mt-1">${item.desc || ''}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">${item.icon || '🍽️'}</span>
                        <button onclick="addToCart('${item.id}', '${cat}')" class="add-btn shadow-md">+</button>
                    </div>`;
                container.appendChild(div);
            });
        };

        window.addToCart = (id, cat) => {
            const itemData = menuData[cat].find(i => i.id === id);
            const existing = cart.find(item => item.id === id);
            if (existing) { existing.qty++; } 
            else { cart.push({ ...itemData, qty: 1 }); }
            updateCartUI();
        };

        window.updateQty = (id, delta) => {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            }
            renderCart();
            updateCartUI();
        };

        function updateCartUI() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            const bar = document.getElementById('cart-bar');
            if (count > 0) {
                bar.classList.add('visible');
                document.getElementById('cart-count-badge').innerText = count;
                document.getElementById('cart-total-bar').innerText = '₪' + total;
            } else { bar.classList.remove('visible'); }
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = cart.length === 0 ? '<p class="text-center opacity-50 py-10">ההזמנה ריקה...</p>' : '';
            cart.forEach(item => {
                const div = document.createElement('div');
                div.className = "glass-card p-4 flex justify-between items-center mb-4";
                div.innerHTML = `
                    <div><div class="font-bold text-lg">${item.name}</div><div class="text-red-700 font-black">₪${item.price * item.qty}</div></div>
                    <div class="flex items-center gap-4 bg-gray-100 rounded-full px-3 py-1">
                        <button onclick="updateQty('${item.id}', -1)" class="font-black text-xl">-</button>
                        <span class="font-bold text-lg">${item.qty}</span>
                        <button onclick="updateQty('${item.id}', 1)" class="font-black text-xl">+</button>
                    </div>`;
                list.appendChild(div);
            });
            document.getElementById('cart-final-total').innerText = '₪' + cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        }

        window.clearCart = () => { cart = []; updateCartUI(); renderCart(); };

        fetchMenu();
    </script>
</body>
</html>
