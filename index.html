<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEVRES BAR - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --primary: #3b82f6; --accent: #fbbf24; --danger: #ef4444; --success: #10b981;
        }

        html { scroll-behavior: smooth; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.6; }

        /* באנר ומבנה */
        .promo-banner { background: var(--accent); color: #000; text-align: center; padding: 10px; font-weight: bold; display: none; position: sticky; top: 0; z-index: 1001; }
        header { text-align: center; padding: 40px 20px; background: linear-gradient(rgba(15,23,42,0.8), rgba(15,23,42,0.8)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80'); background-size: cover; background-position: center; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        .categories-wrapper { position: sticky; top: 0; background: var(--bg); z-index: 1000; padding: 15px 0; border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .categories-container { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding: 0 20px; }
        .cat-btn { padding: 10px 20px; border-radius: 25px; border: 1px solid #334155; background: var(--card); color: var(--text); cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: var(--primary); border-color: var(--primary); }

        .category-section { padding-top: 20px; margin-bottom: 40px; }
        .category-title { font-size: 1.5rem; color: var(--accent); margin-bottom: 20px; border-right: 4px solid var(--primary); padding-right: 15px; }
        
        .menu-item { background: var(--card); padding: 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .item-price { font-weight: bold; color: var(--accent); }

        /* ווידג'ט דירוג צף - העדכון החדש */
        .review-card { 
            position: fixed; 
            bottom: 20px; 
            left: 20px; 
            width: 260px; 
            background: rgba(30, 41, 59, 0.9); /* שקיפות אלגנטית */
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(59, 130, 246, 0.5); 
            border-radius: 20px; 
            padding: 15px; 
            z-index: 2000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(-120%); } to { transform: translateX(0); } }

        .review-card h3 { font-size: 1rem; margin: 0 0 5px 0; }
        .review-card p { font-size: 0.8rem; margin: 0; color: #94a3b8; }
        
        .stars { display: flex; justify-content: center; gap: 8px; margin: 10px 0; font-size: 1.4rem; cursor: pointer; }
        .star { color: #475569; transition: 0.2s; }
        .star.active { color: var(--accent); transform: scale(1.2); }

        .close-review { 
            position: absolute; top: 10px; right: 10px; font-size: 0.8rem; 
            color: #94a3b8; cursor: pointer; background: rgba(0,0,0,0.2); 
            width: 20px; height: 20px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
        }

        .feedback-area { display: none; margin-top: 10px; }
        textarea { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; border-radius: 8px; padding: 8px; font-size: 0.8rem; font-family: inherit; margin-bottom: 8px; }

        /* התאמה למובייל - שלא יסתיר יותר מדי */
        @media (max-width: 480px) {
            .review-card { width: 220px; bottom: 15px; left: 15px; padding: 12px; }
        }
    </style>
</head>
<body>

<div id="promoBanner" class="promo-banner"></div>

<header>
    <h1>HEVRES BAR</h1>
    <p>Afula • Good Vibes • Better Drinks</p>
    <div id="kitchenBadge"></div>
</header>

<div class="container">
    <div class="categories-wrapper">
        <div id="categories-container" class="categories-container"></div>
    </div>
    <div id="menu-content"></div>
</div>

<!-- הווידג'ט הצף -->
<div class="review-card" id="reviewCard">
    <div class="close-review" onclick="window.closeReview()">✕</div>
    <h3>נהניתם? נשמח לדעת! 🍸</h3>
    <p>דרגו את החוויה שלכם</p>
    <div class="stars" id="starRating">
        <span class="star" data-value="1">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="5">★</span>
    </div>
    
    <div id="lowRatingFeedback" class="feedback-area">
        <textarea id="feedbackText" rows="2" placeholder="מה נוכל לשפר?"></textarea>
        <button onclick="sendFeedback()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; width:100%; font-size:0.8rem;">שלח משוב</button>
    </div>

    <div id="thankYouMsg" style="display:none; color:var(--success); font-size:0.8rem; margin-top:10px; font-weight:bold;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYZxPjSML1gHTTANx0Fp6TlhI5_ookHNU",
        authDomain: "hevresbar.firebaseapp.com",
        projectId: "hevresbar",
        storageBucket: "hevresbar.firebasestorage.app",
        messagingSenderId: "737238391891",
        appId: "1:737238391891:web:ad0076917e2f7133eb7aa6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const googleLink = "https://search.google.com/local/writereview?placeid=ChIJ7ZiYNuRTHBURotvjTJOhuHs";

    // לוגיקת כוכבים מאובטחת
    const stars = document.querySelectorAll('.star');
    stars.forEach(star => {
        star.addEventListener('click', () => {
            const val = parseInt(star.getAttribute('data-value'));
            stars.forEach((s, i) => s.classList.toggle('active', i < val));

            if (val >= 4) {
                document.getElementById('thankYouMsg').innerText = "מעולה! מעבירים אתכם לגוגל...";
                document.getElementById('thankYouMsg').style.display = 'block';
                document.getElementById('lowRatingFeedback').style.display = 'none';
                setTimeout(() => { window.open(googleLink, '_blank'); }, 1000);
            } else {
                document.getElementById('lowRatingFeedback').style.display = 'block';
                document.getElementById('thankYouMsg').style.display = 'none';
            }
        });
    });

    window.closeReview = () => {
        document.getElementById('reviewCard').style.transform = 'translateX(-150%)';
        setTimeout(() => { document.getElementById('reviewCard').style.display = 'none'; }, 500);
    };

    window.sendFeedback = () => {
        document.getElementById('lowRatingFeedback').style.display = 'none';
        const msg = document.getElementById('thankYouMsg');
        msg.innerText = "תודה! המשוב התקבל.";
        msg.style.display = 'block';
        setTimeout(window.closeReview, 2000);
    };

    // סנכרון תפריט
    let allItems = [];
    const preferredOrder = ['Starters', 'Burgers', 'Cocktails', 'Beer'];
    const categoryNames = {'Starters': 'ראשונות', 'Burgers': 'המבורגרים', 'Cocktails': 'קוקטיילים', 'Beer': 'שתייה קלה'};

    onSnapshot(collection(db, "menu_hevres"), (snap) => {
        allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTabs();
        renderMenu();
        setupScrollSpy();
    });

    function renderTabs() {
        const container = document.getElementById('categories-container');
        container.innerHTML = preferredOrder.map(cat => `
            <button class="cat-btn" id="tab-${cat}" onclick="window.scrollToCategory('${cat}')">${categoryNames[cat]}</button>
        `).join('');
    }

    function renderMenu() {
        const content = document.getElementById('menu-content');
        content.innerHTML = preferredOrder.map(cat => {
            const catItems = allItems.filter(i => i.category === cat && i.isAvailable !== false);
            if (catItems.length === 0) return '';
            return `
                <section id="section-${cat}" class="category-section">
                    <h2 class="category-title">${categoryNames[cat]}</h2>
                    <div class="menu-grid">
                        ${catItems.map(item => `
                            <div class="menu-item">
                                <div class="item-info">
                                    <h3>${item.name}</h3>
                                    <p>${item.desc || ''}</p>
                                </div>
                                <div class="item-price">₪${item.price}</div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;
        }).join('');
    }

    window.scrollToCategory = (cat) => {
        const el = document.getElementById(`section-${cat}`);
        if (el) {
            const offset = 100;
            const top = el.getBoundingClientRect().top + window.pageYOffset - offset;
            window.scrollTo({ top, behavior: 'smooth' });
        }
    };

    function setupScrollSpy() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const cat = entry.target.id.replace('section-', '');
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    const tab = document.getElementById(`tab-${cat}`);
                    if (tab) tab.classList.add('active');
                }
            });
        }, { rootMargin: '-100px 0px -70% 0px' });
        preferredOrder.forEach(cat => {
            const sec = document.getElementById(`section-${cat}`);
            if (sec) observer.observe(sec);
        });
    }

    onSnapshot(doc(db, "settings", "global"), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            const banner = document.getElementById('promoBanner');
            banner.innerText = data.promoText || "";
            banner.style.display = data.promoText ? 'block' : 'none';
        }
    });
</script>
</body>
</html>
