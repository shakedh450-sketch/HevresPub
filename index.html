<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEVRES BAR - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --primary: #3b82f6;
            --accent: #fbbf24;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        .search-container { margin-bottom: 20px; }
        #searchInput {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--card);
            color: white;
            font-size: 1rem;
        }

        .categories-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 20px;
            scrollbar-width: none;
        }

        .cat-btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid #334155;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .cat-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .menu-grid { display: grid; gap: 20px; }

        .menu-item {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .item-info h3 { margin: 0 0 5px 0; font-size: 1.2rem; }
        .item-info p { margin: 0; color: #94a3b8; font-size: 0.9rem; }
        .item-price { font-weight: bold; color: var(--accent); font-size: 1.1rem; }
    </style>
</head>
<body>

<header>
    <h1>HEVRES BAR</h1>
    <p>Afula • Good Vibes • Better Drinks</p>
</header>

<div class="container">
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="חפשו מנה או קוקטייל...">
    </div>

    <div id="categories-container" class="categories-container"></div>

    <div id="menu-grid" class="menu-grid"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYZxPjSML1gHTTANx0Fp6TlhI5_ookHNU",
        authDomain: "hevresbar.firebaseapp.com",
        projectId: "hevresbar",
        storageBucket: "hevresbar.firebasestorage.app",
        messagingSenderId: "737238391891",
        appId: "1:737238391891:web:ad0076917e2f7133eb7aa6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allItems = [];
    let currentCategory = 'all';

    const categoryNames = {
        'all': 'הכל',
        'Starters': 'ראשונות',
        'Burgers': 'המבורגרים',
        'Cocktails': 'קוקטיילים',
        'Beer': 'שתייה קלה'
    };

    async function loadMenu() {
        try {
            const querySnapshot = await getDocs(collection(db, "menu_hevres"));
            allItems = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderTabs();
            renderMenu(allItems);
        } catch (e) {
            console.error("Error loading menu:", e);
        }
    }

    function renderTabs() {
        const container = document.getElementById('categories-container');
        const preferredOrder = ['all', 'Starters', 'Burgers', 'Cocktails', 'Beer'];
        
        container.innerHTML = preferredOrder.map(cat => {
            const isActive = currentCategory === cat ? 'active' : '';
            return `<button class="cat-btn ${isActive}" onclick="window.filterByCategory('${cat}')">${categoryNames[cat] || cat}</button>`;
        }).join('');
    }

    function renderMenu(items) {
        const grid = document.getElementById('menu-grid');
        
        const filtered = items.filter(item => {
            const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
            const isAvailable = item.isAvailable !== false; 
            return matchesCategory && isAvailable;
        });

        if (filtered.length === 0) {
            grid.innerHTML = '<p style="text-align:center; width:100%; color:#94a3b8; margin-top:20px;">אין מנות זמינות כרגע בקטגוריה זו</p>';
            return;
        }

        grid.innerHTML = filtered.map(item => `
            <div class="menu-item">
                <div class="item-info">
                    <h3>${item.name}</h3>
                    <p>${item.desc || ''}</p>
                </div>
                <div class="item-price">₪${item.price}</div>
            </div>
        `).join('');
    }

    window.filterByCategory = (category) => {
        currentCategory = category;
        renderTabs();
        renderMenu(allItems);
    };

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allItems.filter(item => 
            (item.name.toLowerCase().includes(term) || (item.desc && item.desc.toLowerCase().includes(term))) &&
            (item.isAvailable !== false)
        );
        renderMenu(filtered);
    });

    loadMenu();
</script>

</body>
</html>
